<body>
    <div id="root"></div>

    <script>
        window.onerror = function (msg, url, line, col, error) {
            console.error('[CRITICAL] Runtime Error:', msg, error);
            const container = document.getElementById('root');
            if (container) {
                container.innerHTML = `
                    <div style="padding: 40px; font-family: sans-serif; background: #fff1f2; color: #991b1b; border: 2px solid #fecaca; border-radius: 20px; max-width: 600px; margin: 40px auto; shadow: 0 20px 25px -5px rgba(0,0,0,0.1)">
                        <h1 style="margin-top: 0; font-size: 24px; font-weight: 900; letter-spacing: -0.025em">SYSTEM CRASH</h1>
                        <p style="font-size: 14px; font-weight: 500; opacity: 0.8">The application encountered a fatal script error during initialization.</p>
                        <hr style="border: 0; border-top: 1px solid #fecaca; margin: 20px 0" />
                        <div style="background: #000; color: #fff; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 11px; overflow: auto">
                            <span style="color: #fda4af">Error:</span> ${msg}<br/>
                            <span style="color: #fda4af">File:</span> ${url.split('/').pop()}<br/>
                            <span style="color: #fda4af">Line:</span> ${line}
                        </div>
                        <button onclick="location.reload()" style="margin-top: 20px; background: #000; color: #white; border: 0; padding: 12px 24px; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em">Reintentar Carga</button>
                    </div>
                `;
            }
        };
    </script>

            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                return auth.onAuthStateChanged((u) => {
                    if (u && u.email === ADMIN_EMAIL) {
                        setUser(u);
                        setError(null);
                    } else if (u) {
                        auth.signOut();
                        setError('Acceso denegado. Solo administradores autorizados.');
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });

            const login = async () => {
                if (window.location.protocol === 'file:') {
                    setError('ERROR: Google Sign-In requiere un servidor (http://localhost). Ejecuta el servidor de Python proporcionado.');

                }
                try {
                    await auth.signInWithPopup(provider);

                    setError(`Error: ${e.message}`);
                }

                    <div className="flex justify-between items-center">
                        <div className="space-y-1">
                            <h1 className="text-3xl font-black tracking-tighter uppercase italic">Gestión de Usuarios</h1>
                            <p className="text-zinc-400 text-xs font-bold uppercase tracking-widest">Database Administration</p>
                        </div>
                        <div className="flex gap-4">
                            <input placeholder="Buscar por email..." className="px-6 py-3 bg-zinc-50 border border-zinc-100 rounded-2xl text-xs w-64 focus:border-black transition-all" />
                            <button className="btn-primary text-[10px] uppercase tracking-widest gap-2"><IconUsers /> Exportar DB</button>
                        </div>
                    </div>
                    <div className="bg-white border border-zinc-100 rounded-[2.5rem] overflow-hidden shadow-sm">
                        <table className="w-full text-left">
                            <thead>
                                <tr className="bg-zinc-50 text-[10px] font-black uppercase tracking-[0.2em] text-zinc-400">
                                    <th className="px-10 py-6">Perfil</th>
                                    <th className="px-10 py-6">Identificador</th>
                                    <th className="px-10 py-6">Antigüedad</th>
                                    <th className="px-10 py-6">Estatus</th>
                                    <th className="px-10 py-6 text-right">Opciones</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-zinc-50">
                                {users.map(u => (
                                    <tr key={u.id} className="hover:bg-zinc-50/50 transition-all group">
                                        <td className="px-10 py-6">
                                            <div className="flex items-center gap-4">
                                                <div className="w-10 h-10 rounded-2xl bg-zinc-100 border border-zinc-200 overflow-hidden shadow-sm group-hover:rotate-2 transition-transform">
                                                    <img src={u.photoUrl || `https://ui-avatars.com/api/?name=${u.displayName || u.email}&background=000&color=fff&bold=true`} />
                                                </div>
                                                <div>
                                                    <span className="font-bold text-sm tracking-tight block leading-none">{u.displayName || 'Usuario CONNECT'}</span>
                                                    <span className="text-[10px] text-zinc-400 font-medium">Customer</span>
                                                </div>
                                            </div>
                                        </td>
                                        <td className="px-10 py-6 text-[11px] font-mono text-zinc-400">{u.email}</td>
                                        <td className="px-10 py-6 text-xs text-zinc-500 uppercase font-bold tracking-widest">7 Ene 2026</td>
                                        <td className="px-10 py-6">
                                            <div className={`status-badge inline-flex items-center gap-1.5 ${u.isVerified ? 'bg-black text-white' : 'bg-zinc-100 text-zinc-400'}`}>
                                                {u.isVerified && <IconCheck />}
                                                {u.isVerified ? 'Verificado' : 'Normal'}
                                            </div>
                                        </td>
                                        <td className="px-10 py-6 text-right relative">
                                            <button
                                                onClick={() => setEditingUser(editingUser === u.id ? null : u.id)}
                                                className={`p-2 transition-all rounded-xl ${editingUser === u.id ? 'bg-black text-white' : 'text-zinc-300 hover:text-black hover:bg-zinc-100'}`}
                                            >
                                                <IconEdit />
                                            </button>

                                            {editingUser === u.id && (
                                                <div className="absolute right-10 top-16 w-48 bg-white border border-zinc-100 rounded-2xl shadow-2xl z-50 p-2 space-y-1 animate-in zoom-in duration-200 origin-top-right">
                                                    {userActions.map((action, i) => (
                                                        <button
                                                            key={i}
                                                            onClick={() => { action.onClick(u); setEditingUser(null); }}
                                                            className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-colors ${action.color || 'text-zinc-400 hover:text-black hover:bg-zinc-50'}`}
                                                        >
                                                            <action.icon /> {action.label}
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {users.length === 0 && <div className="py-40 text-center space-y-4">
                            <div className="w-12 h-12 bg-zinc-50 rounded-full flex items-center justify-center mx-auto"><IconUsers /></div>
                            <p className="text-zinc-300 text-[10px] font-black uppercase tracking-widest">Sincronizando con Base de Datos...</p>
                        </div>}
                    </div>

                    <ConfirmModal
                        isOpen={!!userToDelete}
                        onClose={() => setUserToDelete(null)}
                        onConfirm={async () => {
                            if (!userToDelete) return;
                            setIsDeleting(true);
                            try {
                                await db.collection('users').doc(userToDelete.id).delete();
                                setUserToDelete(null);
                            } catch (e) {
                                console.error(e);
                                alert('Error al eliminar usuario');
                            } finally {
                                setIsDeleting(false);
                            }
                        }}
                        loading={isDeleting}
                        title="Eliminar Usuario"
                        message={`¿Estás seguro de que deseas eliminar a ${userToDelete?.email}? Esta acción borrará permanentemente su perfil.`}
                    />
                </div>
            );
        };

        // --- VERIFICATIONS ---
        const Verifications = () => {
            const [users, setUsers] = useState([]);
            const [manualEmail, setManualEmail] = useState('');
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                return db.collection('users').where('isVerified', '==', true).limit(20).onSnapshot(s => setUsers(s.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, []);

            const filteredUsers = useMemo(() => {
                return users.filter(u =>
                    u.email?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    u.displayName?.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [users, searchTerm]);

            const verifyManually = async () => {
                if (!manualEmail) return;
                const snap = await db.collection('users').where('email', '==', manualEmail).get();
                if (!snap.empty) {
                    await db.collection('users').doc(snap.docs[0].id).update({ isVerified: true });
                    alert('Usuario verificado con éxito.');
                    setManualEmail('');
                } else {
                    alert('Usuario no encontrado.');
                }
            };

            return (
                <div className="space-y-12 animate-in fade-in duration-500">
                    <div className="space-y-1">
                        <h1 className="text-3xl font-black tracking-tighter uppercase italic">Protocolo de Verificación</h1>
                        <p className="text-zinc-400 text-xs font-bold uppercase tracking-widest">Validación Manual y Directa</p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-12 text-black">
                        <div className="col-span-1 bg-black p-12 rounded-[3.5rem] text-white space-y-8 shadow-2xl relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-bl-full animate-pulse" />
                            <div className="space-y-4 relative z-10">
                                <div className="p-4 bg-white/10 rounded-2xl w-fit">
                                    <IconShield />
                                </div>
                                <h3 className="font-bold text-2xl tracking-tighter uppercase leading-none">Insignia Manual</h3>
                                <p className="text-zinc-500 text-[10px] font-black uppercase tracking-widest leading-relaxed">Uso exclusivo para validaciones presenciales u oficiales.</p>
                            </div>
                            <div className="space-y-4 relative z-10">
                                <div className="space-y-2">
                                    <label className="text-[9px] font-black uppercase text-zinc-600 tracking-[0.2em] ml-2">Email del Usuario</label>
                                    <input
                                        value={manualEmail}
                                        onChange={e => setManualEmail(e.target.value)}
                                        placeholder="admin@connect.com"
                                        className="w-full bg-white/5 border border-white/10 rounded-[1.5rem] px-8 py-5 text-sm focus:bg-white/10 focus:border-white/20 transition-all outline-none"
                                    />
                                </div>
                                <button onClick={verifyManually} className="w-full bg-white text-black h-16 rounded-[1.5rem] font-black uppercase tracking-widest text-xs hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                                    <IconCheck /> Ejecutar Verificación
                                </button>
                            </div>
                        </div>

                        <div className="col-span-2 space-y-8">
                            <div className="flex justify-between items-center">
                                <h3 className="font-bold text-xl tracking-tight">Audit Log de Verificaciones</h3>
                                <div className="flex gap-4">
                                    <input
                                        type="text"
                                        placeholder="Buscar verificado..."
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                        className="px-6 py-3 bg-zinc-50 border border-zinc-100 rounded-2xl text-xs w-48 focus:border-black transition-all outline-none"
                                    />
                                    <div className="text-[10px] font-black uppercase tracking-widest p-3 bg-zinc-100 rounded-xl leading-none flex items-center">Logs: {filteredUsers.length}</div>
                                </div>
                            </div>
                            <div className="grid gap-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                                {filteredUsers.map(u => (
                                    <div key={u.id} className="flex justify-between items-center p-6 rounded-[2rem] bg-zinc-50 border border-zinc-100/50 hover:bg-white hover:shadow-xl hover:shadow-zinc-100/50 transition-all group">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-black rounded-2xl flex items-center justify-center text-white font-black text-sm uppercase group-hover:scale-110 transition-transform">{u.displayName?.[0] || 'U'}</div>
                                            <div>
                                                <p className="text-sm font-black leading-none mb-1">{u.displayName}</p>
                                                <p className="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">{u.email}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => { if (confirm('¿Revocar verificación?')) db.collection('users').doc(u.id).update({ isVerified: false }) }} className="p-4 rounded-xl text-zinc-300 hover:text-red-500 hover:bg-red-50 transition-all"><IconTrash /></button>
                                    </div>
                                ))}
                                {filteredUsers.length === 0 && <p className="text-center py-20 text-zinc-300 italic text-sm">No hay registros que coincidan con la búsqueda.</p>}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MODERATION ---
        const Moderation = () => {
            const [posts, setPosts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [filter, setFilter] = useState('all');
            const [searchTerm, setSearchTerm] = useState('');
            const [activeCategory, setActiveCategory] = useState('Todas');
            const [isMarketplaceHidden, setIsMarketplaceHidden] = useState(false);
            const [itemToDelete, setItemToDelete] = useState(null);
            const [isDeleting, setIsDeleting] = useState(false);

            const categories = ['Todas', 'Lo tienes', 'Productos', 'Vehículos', 'Propiedades', 'Servicios', 'Empleos', 'Mascotas', 'Trueques'];

            useEffect(() => {
                let postsList = [];
                let wantsList = [];

                const unsubPosts = db.collection('posts')
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .onSnapshot(s => {
                        postsList = s.docs.map(d => ({ id: d.id, _collection: 'posts', ...d.data() }));
                        combineAndSet();
                    });

                const unsubWants = db.collection('wants')
                    .orderBy('createdAt', 'desc')
                    .limit(50)
                    .onSnapshot(s => {
                        wantsList = s.docs.map(d => {
                            const data = d.data();
                            return {
                                id: d.id,
                                _collection: 'wants',
                                ...data,
                                category: 'Lo tienes', // Hardcode category for display/filter
                                title: data.title || data.name || data.description || 'Sin título',
                                price: data.willingToPay || data.price || 0,
                                images: data.images || (data.imageUrl ? [data.imageUrl] : [])
                            };
                        });
                        combineAndSet();
                    });

                const combineAndSet = () => {
                    const combined = [...postsList, ...wantsList].sort((a, b) => {
                        const timeA = a.createdAt?.seconds || 0;
                        const timeB = b.createdAt?.seconds || 0;
                        return timeB - timeA;
                    });
                    setPosts(combined);
                    setLoading(false);
                };

                return () => {
                    unsubPosts();
                    unsubWants();
                };
            }, []);

            useEffect(() => {
                return db.collection('settings').doc('marketplace').onSnapshot(doc => {
                    if (doc.exists) setIsMarketplaceHidden(doc.data().hideAllPosts || false);
                });
            }, []);

            const toggleMarketplaceVisibility = async () => {
                try {
                    await db.collection('settings').doc('marketplace').set({
                        hideAllPosts: !isMarketplaceHidden,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });
                } catch (e) {
                    console.error(e);
                }
            };

            const filteredPosts = posts.filter(post => {
                const matchesFilter = filter === 'all' || post.status === filter;
                const matchesCategory = activeCategory === 'Todas' || post.category === activeCategory;
                const matchesSearch = post.title?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    post.description?.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesFilter && matchesCategory && matchesSearch;
            });

            return (
                <div className="space-y-10 animate-in slide-in-from-right duration-500">
                    <div className="flex flex-col gap-8 md:flex-row md:items-end md:justify-between">
                        <div className="space-y-1">
                            <h1 className="text-4xl font-black tracking-tighter uppercase italic">Marketplace Moderation</h1>
                            <div className="flex items-center gap-4 mt-2">
                                <p className="text-zinc-400 text-xs font-bold uppercase tracking-widest">Control de Inventario y Calidad</p>
                                <div className="h-4 w-px bg-zinc-100 mx-2"></div>
                                <div
                                    onClick={toggleMarketplaceVisibility}
                                    className="flex items-center gap-3 px-4 py-2 bg-zinc-50 rounded-full border border-zinc-100 hover:border-black transition-all cursor-pointer group"
                                >
                                    <div className={`w-8 h-4 rounded-full relative transition-colors ${isMarketplaceHidden ? 'bg-black' : 'bg-zinc-200'}`}>
                                        <motion.div
                                            animate={{ x: isMarketplaceHidden ? 18 : 2 }}
                                            className="w-3 h-3 bg-white rounded-full absolute top-0.5 shadow-sm"
                                        />
                                    </div>
                                    <span className={`text-[9px] font-black uppercase tracking-widest ${isMarketplaceHidden ? 'text-black' : 'text-zinc-400'}`}>
                                        {isMarketplaceHidden ? 'Mercado en Pausa' : 'Mercado Activo'}
                                    </span>
                                    {isMarketplaceHidden && <IconEyeOff />}
                                </div>
                            </div>
                        </div>

                        <div className="flex flex-col md:flex-row gap-4">
                            <div className="relative group">
                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-300">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></svg>
                                </div>
                                <input
                                    type="text"
                                    placeholder="Buscar publicación..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="bg-zinc-50 border border-zinc-100 rounded-2xl pl-12 pr-6 py-3 text-[10px] font-bold uppercase tracking-widest outline-none focus:bg-white focus:border-black transition-all w-full md:w-64"
                                />
                            </div>

                            <div className="flex p-1 bg-zinc-100 rounded-2xl">
                                {['all', 'pending', 'approved'].map(f => (
                                    <button
                                        key={f}
                                        onClick={() => setFilter(f)}
                                        className={`px-6 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all ${filter === f ? 'bg-black text-white shadow-lg' : 'text-zinc-400 hover:text-black'
                                            }`}
                                    >
                                        {f === 'all' ? 'Todos' : f === 'pending' ? 'Borradores' : 'En Vivo'}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="flex gap-2 overflow-x-auto pb-4 no-scrollbar">
                        {categories.map((cat) => (
                            <button
                                key={cat}
                                onClick={() => setActiveCategory(cat)}
                                className={`px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest whitespace-nowrap transition-all border ${activeCategory === cat
                                    ? 'bg-black border-black text-white shadow-xl shadow-black/10'
                                    : 'bg-white border-zinc-100 text-zinc-400 hover:border-black hover:text-black'
                                    }`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        {loading ? (
                            <div className="col-span-full py-40 text-center">
                                <div className="w-8 h-8 border-2 border-black border-t-transparent rounded-full animate-spin mx-auto"></div>
                            </div>
                        ) : filteredPosts.map(post => (
                            <div key={post.id} className="bg-white rounded-[2.5rem] p-6 border border-zinc-100 flex gap-8 items-start hover:shadow-xl transition-all group">
                                <div className="w-40 flex-shrink-0 space-y-3">
                                    <div className="aspect-square bg-zinc-100 rounded-3xl overflow-hidden relative border border-zinc-50 shadow-inner">
                                        {post.images && post.images[0] ? (
                                            <img src={post.images[0]} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                                        ) : (
                                            <div className="w-full h-full flex items-center justify-center text-zinc-200">
                                                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" /><path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" /></svg>
                                            </div>
                                        )}
                                        <div className="absolute top-2 right-2 flex gap-1">
                                            <div className={`px-2 py-1 rounded-full text-[7px] font-black uppercase tracking-tighter shadow-xl ${post.status === 'approved' ? 'bg-black text-white' : 'bg-zinc-200 text-zinc-600'}`}>
                                                {post.status === 'approved' ? 'LIVE' : 'WAIT'}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="px-1 space-y-2">
                                        <h4 className="font-black text-xs leading-none line-clamp-1 uppercase tracking-tighter text-zinc-800">{post.title || 'Publicación sin título'}</h4>
                                        <div className="flex items-center gap-2">
                                            <span className="px-2 py-0.5 bg-zinc-100 rounded text-[8px] font-bold text-zinc-400 uppercase tracking-widest">{post.category || 'Varios'}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex-grow space-y-6 py-2">
                                    <div className="grid grid-cols-2 gap-x-12 gap-y-6">
                                        <div className="space-y-1">
                                            <p className="text-[8px] font-black uppercase text-zinc-300 tracking-widest">Valorización</p>
                                            <p className="font-black text-xl tracking-tight text-black group-hover:text-red-600 transition-colors">
                                                {post._collection === 'wants' ? 'Ofe: ' : ''}
                                                ${Number(post.price)?.toLocaleString() || '0'}
                                            </p>
                                        </div>
                                        <div className="space-y-1 text-right">
                                            <p className="text-[8px] font-black uppercase text-zinc-300 tracking-widest">Indexado el</p>
                                            <p className="font-black text-[10px] text-zinc-400 tracking-widest uppercase">
                                                {post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleDateString('es-ES', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase() : 'Reciente'}
                                            </p>
                                        </div>
                                        <div className="space-y-1 overflow-hidden">
                                            <p className="text-[8px] font-black uppercase text-zinc-300 tracking-widest">Identificador Operador</p>
                                            <p className="font-bold text-[9px] text-zinc-400 tracking-tight truncate font-mono">{post.userId || 'Sistema'}</p>
                                        </div>
                                        <div className="space-y-1 text-right">
                                            <p className="text-[8px] font-black uppercase text-zinc-300 tracking-widest">Validación</p>
                                            <div className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest ${post.status === 'approved' ? 'bg-zinc-100 text-black' : 'bg-red-50 text-red-500'}`}>
                                                <div className={`w-1 h-1 rounded-full ${post.status === 'approved' ? 'bg-green-500' : 'bg-red-500'}`} />
                                                {post.status === 'approved' ? 'Aprobado' : 'Pendiente'}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-6 border-t border-zinc-50 flex justify-between items-center">
                                        <button className="h-10 px-4 rounded-xl bg-zinc-50 text-[9px] font-black uppercase tracking-widest text-zinc-400 hover:text-black hover:bg-zinc-100 transition-all flex items-center gap-2">
                                            <IconDashboard /> Ver Contexto
                                        </button>
                                        <div className="flex gap-2">
                                            <button className="h-12 w-12 flex items-center justify-center bg-zinc-50 text-zinc-300 hover:text-black hover:bg-zinc-100 rounded-2xl transition-all">
                                                <IconEdit />
                                            </button>
                                            <button
                                                onClick={() => setItemToDelete(post)}
                                                className="h-12 w-12 flex items-center justify-center bg-red-50 text-red-300 hover:text-red-500 hover:bg-red-100 rounded-2xl transition-all shadow-sm shadow-red-100/50"
                                            >
                                                <IconTrash />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <ConfirmModal
                        isOpen={!!itemToDelete}
                        onClose={() => setItemToDelete(null)}
                        onConfirm={async () => {
                            if (!itemToDelete) return;
                            setIsDeleting(true);
                            try {
                                await db.collection(itemToDelete._collection).doc(itemToDelete.id).delete();
                                setItemToDelete(null);
                            } catch (e) {
                                console.error(e);
                                alert('Error al eliminar');
                            } finally {
                                setIsDeleting(false);
                            }
                        }}
                        loading={isDeleting}
                        title="Eliminar Publicación"
                        message={`¿Estás seguro de que deseas eliminar este elemento? Esta acción es irreversible.`}
                    />
                    {!loading && filteredPosts.length === 0 && (
                        <div className="py-40 text-center space-y-4">
                            <div className="w-16 h-16 bg-zinc-50 rounded-full flex items-center justify-center mx-auto text-zinc-200">
                                <IconFileText />
                            </div>
                            <p className="text-zinc-300 text-xs font-black uppercase tracking-[0.2em]">Catalogo Vacío o sin coincidencias</p>
                        </div>
                    )}
                </div>
            );
        };

        // --- BOOSTS (ROCKET ANIMATION) ---
        const Boosts = () => {
            return (
                <div className="h-full min-h-[70vh] flex flex-col items-center justify-center text-center space-y-16 relative overflow-hidden">
                    {/* Background Particles */}
                    <div className="absolute inset-0 pointer-events-none">
                        {[...Array(6)].map((_, i) => (
                            <motion.div
                                key={i}
                                initial={{ opacity: 0, y: 100 }}
                                animate={{ opacity: [0, 0.5, 0], y: -500, x: (i - 3) * 100 }}
                                transition={{ duration: 3 + i, repeat: Infinity, ease: "linear", delay: i * 0.5 }}
                                className="absolute bottom-0 left-1/2 w-1 h-20 bg-gradient-to-t from-black to-transparent"
                            />
                        ))}
                    </div>

                    <div className="relative group">
                        <motion.div
                            animate={{
                                y: [0, -40, 0],
                                rotate: [0, 5, -5, 0],
                                scale: [1, 1.05, 1]
                            }}
                            transition={{
                                duration: 5,
                                repeat: Infinity,
                                ease: "easeInOut"
                            }}
                            className="relative z-10 p-16 bg-black rounded-[4rem] shadow-[0_50px_100px_-20px_rgba(0,0,0,0.5)] border border-white/10"
                        >
                            <div className="text-white transform scale-[2.5] relative z-10">

                    <div className="p-8 border-t border-zinc-900">
                        <button onClick={() => auth.signOut()} className="w-full flex items-center justify-center gap-2 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest text-red-500 hover:bg-red-500/10 transition-all">
                            Salir del Sistema
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState('dashboard');

            return (
                <AuthGuard>
                    {(user) => (
                        <div className="flex min-h-screen bg-white">
                            <Sidebar current={page} setPage={setPage} />
                            <main className="ml-72 flex-1 p-16 overflow-x-hidden">
                                <header className="flex justify-between items-center mb-20">
                                    <div className="flex items-center gap-3">
                                        <div className="w-2 h-2 rounded-full bg-black"></div>
                                        <div className="text-[10px] font-black text-zinc-300 uppercase tracking-[0.4em]">SYSTEM MASTER v2.0</div>
                                    </div>
                                    <div className="flex items-center gap-8">
                                        <div className="text-right">
                                            <p className="text-sm font-black tracking-tighter leading-none mb-1 text-black uppercase">{user.displayName || 'Root Admin'}</p>
                                            <p className="text-[9px] text-zinc-300 font-bold uppercase tracking-widest italic">Authorized Operator</p>
                                        </div>
                                        <div className="w-14 h-14 bg-black rounded-[1.5rem] transition-all hover:rotate-6 hover:scale-110 shadow-xl shadow-black/10 flex items-center justify-center p-0.5 border-2 border-zinc-100">
                                            <img src={`https://ui-avatars.com/api/?name=${user.email}&background=000&color=fff&bold=true&rounded=true`} className="rounded-[1.2rem]" />
                                        </div>
                                    </div>
                                </header>

                                <div className="max-w-7xl mx-auto">
                                    <AnimatePresence mode="wait">
                                        <motion.div
                                            key={page}
                                            initial={{ opacity: 0, x: 20 }}
                                            animate={{ opacity: 1, x: 0 }}
                                            exit={{ opacity: 0, x: -20 }}
                                            transition={{ type: "spring", bounce: 0, duration: 0.5 }}
                                        >
                                            {page === 'dashboard' && <Dashboard />}
                                            {page === 'users' && <Users />}
                                            {page === 'verifications' && <Verifications />}
                                            {page === 'publications' && <Moderation />}
                                            {page === 'notifications' && <Notifications />}
                                            {page === 'boosts' && <Boosts />}
                                            {page === 'ads' && <Ads />}
                                            {page === 'reports' && <Reports />}
                                            {page === 'tools' && <Tools />}
                                        </motion.div>
                                    </AnimatePresence>
                                </div>
                            </main>
                        </div>
                    )}
                </AuthGuard>
            );
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>

</html>
